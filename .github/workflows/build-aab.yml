on:
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 1) Unzip app.zip (must be in repo root)
      - name: Unzip app.zip
        run: |
          set -e
          if [ ! -f "app.zip" ]; then
            echo "ERROR: app.zip not found in repo root."
            echo "Upload your source zip as app.zip (repo root), then rerun."
            exit 1
          fi

          rm -rf src
          mkdir -p src
          unzip -q app.zip -d src

          # Find the folder that contains package.json
          ROOT_DIR="$(find src -maxdepth 4 -name package.json -print -quit | xargs -r dirname)"
          if [ -z "$ROOT_DIR" ]; then
            echo "ERROR: Could not find package.json inside app.zip."
            echo "Your zip must contain a Node project with package.json."
            exit 1
          fi

          echo "ROOT_DIR=$ROOT_DIR" >> "$GITHUB_ENV"
          echo "Detected ROOT_DIR=$ROOT_DIR"

      # 2) Tooling
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 3) Install + build web (Vite/React/etc.)
      - name: Install dependencies
        run: |
          set -e
          cd "$ROOT_DIR"
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build web (non-blocking)
        run: |
          cd "$ROOT_DIR"
          npm run build || true

      # 4) Ensure Capacitor Android exists, then build Debug AAB
      - name: Capacitor sync + Gradle bundleDebug
        run: |
          set -e
          cd "$ROOT_DIR"

          # Detect common web build output folder
          WEB_DIR=""
          if [ -d "dist" ]; then WEB_DIR="dist"; fi
          if [ -z "$WEB_DIR" ] && [ -d "build" ]; then WEB_DIR="build"; fi
          if [ -z "$WEB_DIR" ] && [ -d "www" ]; then WEB_DIR="www"; fi
          if [ -z "$WEB_DIR" ]; then
            echo "ERROR: Could not find dist/ or build/ or www/ folder."
            echo "Your project must produce a web output folder."
            exit 1
          fi
          echo "Using WEB_DIR=$WEB_DIR"

          # Make sure capacitor packages exist
          npm install --no-save @capacitor/core @capacitor/cli @capacitor/android

          # Initialize capacitor if config missing
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Global Market Scanner" "com.premiumscanner.app" --web-dir="$WEB_DIR"
          fi

          # Add android platform if missing
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          # Sync to android
          npx cap sync android

          # Build Debug AAB (good for Internal App Sharing)
          cd android
          chmod +x ./gradlew
          ./gradlew bundleDebug

      # 5) Upload the .aab artifact
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-app-sharing-aab
          path: |
            **/app/build/outputs/bundle/debug/*.aab