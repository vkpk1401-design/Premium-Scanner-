<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Premium Scanner — Test Page</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#121c33;
      --text:#e8eefc;
      --muted:#9bb0d1;
      --gold:#d6b45a;
      --line:rgba(255,255,255,.10);
      --bull:#2dd4bf;
      --bear:#fb7185;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(214,180,90,.18), transparent 50%),
        radial-gradient(900px 500px at 80% 20%, rgba(45,212,191,.12), transparent 55%),
        var(--bg);
    }
    header{
      position:sticky; top:0;
      backdrop-filter: blur(10px);
      background:rgba(11,18,32,.72);
      border-bottom:1px solid var(--line);
      padding:14px 14px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .brand{display:flex; gap:10px; align-items:center; min-width:0}
    .logo{
      width:34px; height:34px; border-radius:10px;
      border:1px solid rgba(214,180,90,.35);
      background:linear-gradient(135deg, rgba(214,180,90,.92), rgba(214,180,90,.10));
      box-shadow:0 10px 30px rgba(214,180,90,.16);
      flex:0 0 auto;
    }
    h1{font-size:14px; margin:0}
    .sub{font-size:12px; color:var(--muted); margin-top:2px}
    main{max-width:860px; margin:0 auto; padding:14px 14px 80px}
    .card{
      background:rgba(18,28,51,.92);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      box-shadow:0 16px 50px rgba(0,0,0,.25);
    }
    .row{display:flex; flex-wrap:wrap; gap:10px; align-items:center}
    .divider{height:1px; background:var(--line); margin:12px 0}
    .pill{
      font-size:12px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--text);
      user-select:none;
    }
    .pill.active{
      border-color:rgba(214,180,90,.45);
      box-shadow:0 0 0 3px rgba(214,180,90,.12) inset;
    }
    button{
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }
    button.primary{
      border-color:rgba(214,180,90,.55);
      background:linear-gradient(135deg, rgba(214,180,90,.35), rgba(214,180,90,.10));
    }
    .muted{color:var(--muted); font-size:12px; line-height:1.5}
    .list{display:flex; flex-direction:column; gap:10px}
    .item{
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }
    .sym{font-size:14px; font-weight:900}
    .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px}
    .chip{
      font-size:11px;
      color:var(--muted);
      border:1px solid var(--line);
      padding:4px 8px;
      border-radius:999px;
    }
    .tag{
      font-size:12px; font-weight:900;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      white-space:nowrap;
    }
    .bull{background:rgba(45,212,191,.85); border-color:rgba(45,212,191,.45); color:#052015;}
    .bear{background:rgba(251,113,133,.85); border-color:rgba(251,113,133,.45); color:#2a0710;}
    .toast{
      position:fixed;
      left:50%; transform:translateX(-50%);
      bottom:16px;
      width:min(720px, calc(100% - 24px));
      border:1px solid var(--line);
      background:rgba(18,28,51,.92);
      padding:12px 14px;
      border-radius:14px;
      display:none;
    }
    .toast.show{display:block}
  </style>
</head>

<body>
<header>
  <div class="brand">
    <div class="logo"></div>
    <div style="min-width:0">
      <h1>Premium Scanner — Test</h1>
      <div class="sub">Timeframes • Green/Red breakouts • Tap items • Sound</div>
    </div>
  </div>
  <button class="primary" id="btnSound">Test Sound</button>
</header>

<main>
  <section class="card">
    <div class="row" style="justify-content:space-between">
      <div>
        <div style="font-weight:900">Breakout Scanner</div>
        <div class="muted">Bullish = Green • Bearish = Red</div>
      </div>
      <button id="btnReset">Reset</button>
    </div>

    <div class="divider"></div>

    <div class="row" aria-label="timeframes">
      <span class="muted" style="min-width:92px">Timeframe</span>
      <span class="pill active" data-tf="1m">1m</span>
      <span class="pill" data-tf="5m">5m</span>
      <span class="pill" data-tf="15m">15m</span>
      <span class="pill" data-tf="1h">1h</span>
      <span class="pill" data-tf="1D">1D</span>
    </div>

    <div class="divider"></div>

    <div class="list" id="list"></div>

    <div class="divider"></div>
    <div class="muted">
      How to test: change timeframe → tap any stock → you’ll see a message popup at bottom.
      Tap “Test Sound” once (browsers require a tap to play audio).
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
  const itemsByTf = {
    "1m": [
      {sym:"RELIANCE", dir:"bull", reason:["ORB Break","Volume Spike","VWAP Reclaim"]},
      {sym:"TCS",      dir:"bear", reason:["Support Break","Weak RSI","Supply Zone"]},
    ],
    "5m": [
      {sym:"HDFCBANK", dir:"bull", reason:["20D High Break","Trend Strength","Higher High"]},
      {sym:"INFY",     dir:"bear", reason:["Lower Low","Bear Engulf","Sell Volume"]},
    ],
    "15m": [
      {sym:"ICICIBANK",dir:"bull", reason:["Range Break","OI Build-up","Momentum"]},
      {sym:"SBIN",     dir:"bear", reason:["Breakdown","Distribution","VWAP Reject"]},
    ],
    "1h": [
      {sym:"NIFTY",    dir:"bull", reason:["Breakout","Market Strength","Breadth +"]},
      {sym:"BANKNIFTY",dir:"bear", reason:["Breakdown","Risk-Off","Heavy Calls"]},
    ],
    "1D": [
      {sym:"TATAMOTORS",dir:"bull", reason:["52W High","Trend Continuation","Strong Close"]},
      {sym:"ADANIPORTS",dir:"bear", reason:["Gap Down","Resistance Reject","Weak Close"]},
    ],
  };

  let tf = "1m";
  const list = document.getElementById("list");
  const toast = document.getElementById("toast");

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"), 2400);
  }

  function render(){
    list.innerHTML = "";
    for(const it of itemsByTf[tf]){
      const el = document.createElement("div");
      el.className = "item";
      el.innerHTML = `
        <div style="min-width:0">
          <div class="sym">${it.sym} <span style="font-size:11px;color:#9bb0d1">• ${tf}</span></div>
          <div class="chips">
            ${it.reason.map(r => `<span class="chip">${r}</span>`).join("")}
          </div>
        </div>
        <div class="tag ${it.dir === "bull" ? "bull" : "bear"}">
          ${it.dir === "bull" ? "BULLISH" : "BEARISH"}
        </div>
      `;
      el.addEventListener("click", ()=>{
        showToast(`${it.sym}: ${it.dir === "bull" ? "Bullish breakout" : "Bearish breakdown"} (${tf})`);
      });
      list.appendChild(el);
    }
  }

  document.querySelectorAll(".pill").forEach(p=>{
    p.addEventListener("click", ()=>{
      document.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));
      p.classList.add("active");
      tf = p.dataset.tf;
      render();
      showToast(`Timeframe: ${tf}`);
    });
  });

  document.getElementById("btnReset").addEventListener("click", ()=>{
    tf = "1m";
    document.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));
    document.querySelector('.pill[data-tf="1m"]').classList.add("active");
    render();
    showToast("Reset to 1m");
  });

  function beep(){
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "sine";
    o.frequency.value = 880;
    g.gain.value = 0.12;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    setTimeout(()=>{ o.stop(); ctx.close(); }, 180);
  }

  document.getElementById("btnSound").addEventListener("click", ()=>{
    try { beep(); showToast("Sound played"); }
    catch(e){ showToast("Sound blocked—tap again or check volume."); }
  });

  render();
</script>
</body>
</html>
